<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Island Timeline - My Node.js Website</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
        }
        #scene-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
            padding: 20px;
        }
        nav ul {
            background-color: rgba(244, 244, 244, 0.7);
        }
        .instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
    <!-- Load Three.js libraries from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="scene-container"></div>
    
    <div class="content">
        <header>
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                    <li><a href="/island" class="active">3D Island</a></li>
                </ul>
            </nav>
        </header>
    </div>
    
    <div class="instructions">
        <p>Press SPACE or click the "Next Stop" button to move the character to the next timeline stop.</p>
        <p>Use mouse to rotate the view and scroll to zoom in/out.</p>
    </div>

    <script src="/js/island-script.js"></script>
</body>
</html>
