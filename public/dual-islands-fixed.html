<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Islands Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow: hidden;
        }

        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #004466, #000000);
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 1.5rem;
            z-index: 1000;
        }

        .ui-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
        }

        .flight-btn {
            background: rgba(50, 150, 200, 0.7);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .flight-btn:hover {
            background: rgba(70, 170, 220, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
        }

        .info-panel {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 1rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .info-panel:hover {
            opacity: 1;
        }

        #debug-info {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="scene-container">
        <div class="loading">Loading Islands Environment...</div>
    </div>

    <div class="info-panel">
        Current Location: <span id="location-display">Main Island</span>
    </div>
    
    <div class="ui-container">
        <button class="flight-btn" id="flight-btn">Fly to Distant Island</button>
    </div>

    <div id="debug-info"></div>
    
    <!-- Load Three.js libraries -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // Simple islands with flight animation - Fixed Version
        let currentLocation = 'main';
        let isAnimating = false;
        
        // Get UI elements
        const debugInfo = document.getElementById('debug-info');
        const locationDisplay = document.getElementById('location-display');
        const flightBtn = document.getElementById('flight-btn');
        
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x88ccff);
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 10, 1000000);
        camera.position.set(0, 10000, 30000);
        
        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('scene-container').appendChild(renderer.domElement);
        
        // Controls setup
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 500000;
        controls.minDistance = 100;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        // Create island positions
        const mainIslandPosition = new THREE.Vector3(0, 0, 0);
        const distantIslandPosition = new THREE.Vector3(0, 0, -500000);
        
        // Initialize camera to look at main island
        controls.target.copy(mainIslandPosition);
        
        // Create placeholder boxes while models load
        const mainPlaceholder = new THREE.Mesh(
            new THREE.BoxGeometry(10000, 2000, 10000),
            new THREE.MeshPhongMaterial({ color: 0xff0000, wireframe: true })
        );
        mainPlaceholder.position.copy(mainIslandPosition);
        scene.add(mainPlaceholder);
        
        // Create green box for distant island
        const distantPlaceholder = new THREE.Mesh(
            new THREE.BoxGeometry(20000, 4000, 20000),
            new THREE.MeshPhongMaterial({ color: 0x00ff00, wireframe: true })
        );
        distantPlaceholder.position.copy(distantIslandPosition);
        scene.add(distantPlaceholder);

        // Create island groups to hold the models
        const mainIslandGroup = new THREE.Group();
        const distantIslandGroup = new THREE.Group();
        
        mainIslandGroup.position.copy(mainIslandPosition);
        distantIslandGroup.position.copy(distantIslandPosition);
        
        scene.add(mainIslandGroup);
        scene.add(distantIslandGroup);
        
        // Load GLB models with improved debugging
        const loader = new THREE.GLTFLoader();
        
        // Add debugging error handlers
        loader.onError = function(e) {
            console.error("GLTFLoader global error:", e);
        };
        
        console.log("Starting to load GLTF models...");
        console.log("Main island model path:", 'models/GloomyDoomy2.glb');
        console.log("Distant island model path:", 'models/IslandCopyTest.glb');
        
        // Variables to track loading progress
        let modelsLoaded = 0;
        const totalModels = 2;
        
        // Load the main island (GloomyDoomy2.glb)
        loader.load(
            'models/GloomyDoomy2.glb',
            function (gltf) {
                console.log("Main island model loaded successfully", gltf);
                
                try {
                    gltf.scene.scale.set(2000, 2000, 2000);
                    gltf.scene.position.set(0, -500, 0);
                    mainIslandGroup.add(gltf.scene);
                    
                    gltf.scene.traverse(function (node) {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                            console.log("Main island mesh:", node.name);
                        }
                    });
                } catch (e) {
                    console.error("Error processing main island model:", e);
                }

                modelsLoaded++;
                checkAllModelsLoaded();
            },
            function (xhr) {
                const percent = xhr.loaded / xhr.total * 100;
                console.log('Main Island Loading: ' + percent.toFixed(2) + '% loaded');
            },
            function (error) {
                console.error('Failed to load the main island model:', error);
                console.error('Error message details:', error.message);
                alert('Error loading main island model. Check the console for details.');
                // Keep the placeholder visible if model fails to load
                modelsLoaded++;
                checkAllModelsLoaded();
            }
        );

        // Load the distant island (IslandCopyTest.glb)
        loader.load(
            'models/IslandCopyTest.glb',
            function (gltf) {
                console.log("Distant island model loaded successfully", gltf);
                
                try {
                    gltf.scene.scale.set(8000, 8000, 8000);
                    gltf.scene.position.set(0, -500, 0);
                    distantIslandGroup.add(gltf.scene);
                    
                    gltf.scene.traverse(function (node) {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                            console.log("Distant island mesh:", node.name);
                        }
                    });
                } catch (e) {
                    console.error("Error processing distant island model:", e);
                }

                modelsLoaded++;
                checkAllModelsLoaded();
            },
            function (xhr) {
                const percent = xhr.loaded / xhr.total * 100;
                console.log('Distant Island Loading: ' + percent.toFixed(2) + '% loaded');
            },
            function (error) {
                console.error('Failed to load the distant island model:', error);
                console.error('Error message details:', error.message);
                alert('Error loading distant island model. Check the console for details.');
                // Keep the placeholder visible if model fails to load
                modelsLoaded++;
                checkAllModelsLoaded();
            }
        );

        function checkAllModelsLoaded() {
            console.log(`Models loaded: ${modelsLoaded}/${totalModels}`);
            
            if (modelsLoaded === totalModels) {
                document.querySelector('.loading').style.display = 'none';
                console.log("All models loaded successfully!");
                
                // Hide placeholders when models are loaded
                mainPlaceholder.visible = false;
                distantPlaceholder.visible = false;
            }
        }
        
        // Add grid helper
        const gridHelper = new THREE.GridHelper(50000, 50);
        scene.add(gridHelper);
        
        // Add axes helper
        const axesHelper = new THREE.AxesHelper(10000);
        scene.add(axesHelper);
        
        // Update debug info
        function updateDebugInfo() {
            debugInfo.innerHTML = `
                Camera Position: (${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)})<br>
                Target: (${Math.round(controls.target.x)}, ${Math.round(controls.target.y)}, ${Math.round(controls.target.z)})<br>
                Current Location: ${currentLocation}
            `;
        }
        
        // Handle flight button click
        flightBtn.addEventListener('click', function() {
            if (isAnimating) return;
            
            console.log("Starting flight animation");
            isAnimating = true;
            controls.enabled = false;
            
            // Define start and target positions
            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            
            let endPos, endTarget;
            
            if (currentLocation === 'main') {
                // Flying to distant island
                endPos = new THREE.Vector3(0, 10000, -470000); // Camera position near distant island
                endTarget = distantIslandPosition.clone(); // Look at distant island
                currentLocation = 'distant';
                flightBtn.textContent = 'Return to Main Island';
                locationDisplay.textContent = 'Distant Island';
            } else {
                // Flying back to main island
                endPos = new THREE.Vector3(0, 10000, 30000); // Camera position near main island
                endTarget = mainIslandPosition.clone(); // Look at main island
                currentLocation = 'main';
                flightBtn.textContent = 'Fly to Distant Island';
                locationDisplay.textContent = 'Main Island';
            }
            
            // Animation setup
            const duration = 10000; // 10 seconds
            const startTime = Date.now();
            
            // Get midpoints for curve
            const midPos1 = startPos.clone().lerp(endPos, 0.3);
            midPos1.y = 50000; // Fly high in the middle
            
            const midPos2 = startPos.clone().lerp(endPos, 0.7);
            midPos2.y = 50000; // Fly high in the middle
            
            // Flight path
            const path = [
                { pos: startPos, target: startTarget },
                { pos: midPos1, target: startTarget.clone().lerp(endTarget, 0.3) },
                { pos: midPos2, target: startTarget.clone().lerp(endTarget, 0.7) },
                { pos: endPos, target: endTarget }
            ];
            
            function animate() {
                const elapsed = Date.now() - startTime;
                let progress = Math.min(elapsed / duration, 1);
                
                if (progress < 1) {
                    // Cubic easing
                    progress = progress < 0.5
                        ? 4 * progress * progress * progress
                        : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                    
                    // Find the right segment
                    const segments = path.length - 1;
                    const segmentProgress = progress * segments;
                    const segmentIndex = Math.min(Math.floor(segmentProgress), segments - 1);
                    const segmentT = segmentProgress - segmentIndex;
                    
                    // Get interpolation points
                    const p0 = path[segmentIndex].pos;
                    const p1 = path[segmentIndex + 1].pos;
                    const t0 = path[segmentIndex].target;
                    const t1 = path[segmentIndex + 1].target;
                    
                    // Update camera
                    camera.position.lerpVectors(p0, p1, segmentT);
                    controls.target.lerpVectors(t0, t1, segmentT);
                    
                    updateDebugInfo();
                    requestAnimationFrame(animate);
                } else {
                    // Animation complete
                    camera.position.copy(endPos);
                    controls.target.copy(endTarget);
                    
                    controls.enabled = true;
                    isAnimating = false;
                    
                    console.log("Animation complete, new location:", currentLocation);
                    updateDebugInfo();
                }
            }
            
            animate();
        });
        
        // Animation loop
        function render() {
            requestAnimationFrame(render);
            controls.update();
            updateDebugInfo();
            renderer.render(scene, camera);
        }
        
        render();
        
        // Handle window resize
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
