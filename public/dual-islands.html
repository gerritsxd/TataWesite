<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Islands Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow: hidden;
        }

        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #004466, #000000);
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 1.5rem;
            z-index: 1000;
        }

        .ui-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
        }

        .flight-btn {
            background: rgba(50, 150, 200, 0.7);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .flight-btn:hover {
            background: rgba(70, 170, 220, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
        }

        .info-panel {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 1rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .info-panel:hover {
            opacity: 1;
        }

        #debug-info {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="scene-container">
        <div class="loading">Loading Islands Environment...</div>
    </div>

    <div class="info-panel">
        Current Location: <span id="location-display">Main Island</span>
    </div>
    
    <div class="ui-container">
        <button class="flight-btn" id="flight-btn">Fly to Distant Island</button>
    </div>

    <div id="debug-info"></div>
    
    <!-- Load Three.js libraries -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x88ccff);
        scene.fog = new THREE.FogExp2(0x88ccff, 0.00001);

        // Camera setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 10, 10000000);
        camera.position.set(0, 10000, 30000);

        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('scene-container').appendChild(renderer.domElement);

        // Controls setup
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 5000000;
        controls.minDistance = 100;
        
        // Initialize camera to look at main island
        camera.lookAt(new THREE.Vector3(0, 0, 0));
        controls.target.copy(new THREE.Vector3(0, 0, 0));

        // Debug info
        const debugInfo = document.getElementById('debug-info');
        function updateDebugInfo() {
            debugInfo.innerHTML = `
                Camera Position: (${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)})<br>
                Target: (${Math.round(controls.target.x)}, ${Math.round(controls.target.y)}, ${Math.round(controls.target.z)})
            `;
        }

        // Add debug helpers
        const axesHelper = new THREE.AxesHelper(5000);
        scene.add(axesHelper);
        
        // Add a grid helper for reference
        const gridHelper = new THREE.GridHelper(50000, 20, 0xffffff, 0x888888);
        scene.add(gridHelper);

        // Lighting setup
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(1, 1, 1);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 50000;
        scene.add(directionalLight);
        
        // Add a hemisphere light for better outdoor lighting
        const hemisphereLight = new THREE.HemisphereLight(0x0088ff, 0x00ff88, 0.6);
        scene.add(hemisphereLight);

        // Create island groups
        const mainIslandGroup = new THREE.Group();
        const distantIslandGroup = new THREE.Group();
        scene.add(mainIslandGroup);
        scene.add(distantIslandGroup);

        // Create island positions (75% closer than 2,000,000 = 500,000)
        const mainIslandPosition = new THREE.Vector3(0, 0, 0);
        const distantIslandPosition = new THREE.Vector3(0, 0, -500000);
        
        // Position the distant island group
        distantIslandGroup.position.copy(distantIslandPosition);

        // Add red and green marker boxes to help visibility
        const mainMarker = new THREE.Mesh(
            new THREE.BoxGeometry(5000, 5000, 5000),
            new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true })
        );
        mainMarker.position.set(0, 0, 0);
        mainIslandGroup.add(mainMarker);
        
        const distantMarker = new THREE.Mesh(
            new THREE.BoxGeometry(20000, 20000, 20000),
            new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true })
        );
        distantMarker.position.set(0, 0, 0);
        distantIslandGroup.add(distantMarker);

        // Variables to track loading progress
        let modelsLoaded = 0;
        const totalModels = 2;

        // Load the GLB models
        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        // Load the main island (GloomyDoomy2.glb)
        loader.load(
            'models/GloomyDoomy2.glb',
            function (gltf) {
                gltf.scene.scale.set(2000, 2000, 2000);
                gltf.scene.position.set(0, -500, 0);
                mainIslandGroup.add(gltf.scene);
                
                gltf.scene.traverse(function (node) {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });

                modelsLoaded++;
                checkAllModelsLoaded();
            },
            function (xhr) {
                console.log('Main Island Loading: ' + (xhr.loaded / xhr.total * 100) + '% loaded');
            },
            function (error) {
                console.error('An error happened while loading the main island:', error);
            }
        );

        // Load the distant island (IslandCopyTest.glb)
        loader.load(
            'models/IslandCopyTest.glb',
            function (gltf) {
                gltf.scene.scale.set(8000, 8000, 8000);
                gltf.scene.position.set(0, -500, 0);
                distantIslandGroup.add(gltf.scene);
                
                gltf.scene.traverse(function (node) {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });

                modelsLoaded++;
                checkAllModelsLoaded();
            },
            function (xhr) {
                console.log('Distant Island Loading: ' + (xhr.loaded / xhr.total * 100) + '% loaded');
            },
            function (error) {
                console.error('An error happened while loading the distant island:', error);
            }
        );

        function checkAllModelsLoaded() {
            if (modelsLoaded === totalModels) {
                document.querySelector('.loading').style.display = 'none';
                console.log("All models loaded successfully!");
            }
        }

        // Animation variables
        let isAnimating = false;
        let currentLocation = 'main'; // 'main' or 'distant'
        const locationDisplay = document.getElementById('location-display');
        const flightBtn = document.getElementById('flight-btn');

        // Camera animation function
        function animateCameraFlight() {
            if (isAnimating) return;
            
            console.log("Starting flight animation");
            console.log("Current location:", currentLocation);
            
            isAnimating = true;
            controls.enabled = false;
            
            // Get current camera position and target
            const startPosition = camera.position.clone();
            const startLookAt = controls.target.clone();
            
            // Determine destination based on current location
            let targetPosition, endPosition, endLookAt;
            
            if (currentLocation === 'main') {
                // Flying from main to distant island
                console.log("Flying to distant island");
                targetPosition = distantIslandPosition.clone();
                endPosition = new THREE.Vector3(0, 10000, 600000).add(targetPosition);
                endLookAt = targetPosition;
                currentLocation = 'distant';
                flightBtn.textContent = 'Return to Main Island';
                locationDisplay.textContent = 'Distant Island';
            } else {
                // Flying from distant to main island
                console.log("Flying back to main island");
                targetPosition = mainIslandPosition.clone();
                endPosition = new THREE.Vector3(0, 10000, 600000).add(targetPosition);
                endLookAt = targetPosition;
                currentLocation = 'main';
                flightBtn.textContent = 'Fly to Distant Island';
                locationDisplay.textContent = 'Main Island';
            }
            
            console.log("Target position:", targetPosition);
            console.log("End camera position:", endPosition);
            
            // Create intermediate points for a curved path (arched flight)
            const flightHeight = 100000;
            const controlPoint1 = new THREE.Vector3().lerpVectors(startPosition, endPosition, 0.3);
            controlPoint1.y = flightHeight;
            
            const controlPoint2 = new THREE.Vector3().lerpVectors(startPosition, endPosition, 0.7);
            controlPoint2.y = flightHeight;
            
            // Create path segments
            const path = [
                { position: startPosition, lookAt: startLookAt },
                { position: controlPoint1, lookAt: new THREE.Vector3().lerpVectors(startLookAt, endLookAt, 0.3) },
                { position: controlPoint2, lookAt: new THREE.Vector3().lerpVectors(startLookAt, endLookAt, 0.7) },
                { position: endPosition, lookAt: endLookAt }
            ];
            
            // Log the path
            console.log("Flight path:", path);
            
            // Animation duration (in milliseconds)
            const duration = 15000;
            const startTime = Date.now();
            
            function animateStep() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                if (progress < 1) {
                    // Calculate which segment we're in
                    const segments = path.length - 1;
                    const segmentProgress = progress * segments;
                    const segmentIndex = Math.min(Math.floor(segmentProgress), segments - 1);
                    const segmentT = segmentProgress - segmentIndex;
                    
                    // Get current segment points
                    const p0 = path[segmentIndex].position;
                    const p1 = path[segmentIndex + 1].position;
                    const l0 = path[segmentIndex].lookAt;
                    const l1 = path[segmentIndex + 1].lookAt;
                    
                    // Update camera position and target
                    camera.position.lerpVectors(p0, p1, segmentT);
                    controls.target.lerpVectors(l0, l1, segmentT);
                    camera.lookAt(controls.target);
                    
                    updateDebugInfo();
                    requestAnimationFrame(animateStep);
                } else {
                    // Animation complete
                    console.log("Animation complete");
                    console.log("Final camera position:", camera.position);
                    console.log("Final target:", controls.target);
                    
                    // Ensure final position is exact
                    camera.position.copy(endPosition);
                    controls.target.copy(endLookAt);
                    camera.lookAt(controls.target);
                    
                    controls.enabled = true;
                    isAnimating = false;
                    updateDebugInfo();
                }
            }
            
            // Start the animation
            animateStep();
        }

        // Add flight button event listener
        flightBtn.addEventListener('click', animateCameraFlight);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateDebugInfo();
            renderer.render(scene, camera);
        }
        
        animate();

        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        window.addEventListener('resize', onWindowResize, false);
    </script>
</body>
</html>
