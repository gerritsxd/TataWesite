<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Islands Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: Arial, sans-serif; color: white; }
        #scene-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        
        .ui-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        
        .flight-btn {
            background: rgba(50, 150, 200, 0.7);
            border: 1px solid rgba(100, 200, 255, 0.5);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .info-panel {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(30, 30, 30, 0.7);
            border-radius: 10px;
            padding: 15px 20px;
        }
        
        #debug-info {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            font-size: 1.5rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="scene-container"></div>
    
    <div class="loading">Loading Islands...</div>
    
    <div class="info-panel">
        Current Location: <span id="location-display">Main Island</span>
    </div>
    
    <div class="ui-container">
        <button class="flight-btn" id="flight-btn">Fly to Distant Island</button>
    </div>
    
    <div id="debug-info"></div>
    
    <!-- Section information panel -->
    <div id="section-info" style="display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; max-width: 600px; text-align: center; z-index: 1000;">
        <h2 id="section-title">Section Title</h2>
        <p id="section-description">Section description will appear here.</p>
    </div>
    
    <!-- Character controls -->
    <div style="position: fixed; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;">
        <button id="toggle-character" style="padding: 10px; background: rgba(50, 150, 200, 0.7); color: white; border: none; border-radius: 5px; cursor: pointer;">Toggle Character Movement</button>
        <div style="display: flex; align-items: center; gap: 10px;">
            <label for="character-speed" style="color: white;">Speed:</label>
            <input type="range" id="character-speed" min="1" max="10" value="3" style="width: 100px;">
        </div>
    </div>
    
    <!-- Step 1: Load Three.js core library -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    
    <!-- Step 2: Wait for Three.js to load before loading addons -->
    <script>
        // Global variables we'll use throughout
        let camera, scene, renderer, controls;
        let mainIsland, distantIsland;
        let isAnimating = false;
        let currentLocation = 'main';
        
        // Element references
        const debugInfo = document.getElementById('debug-info');
        const locationDisplay = document.getElementById('location-display');
        const flightBtn = document.getElementById('flight-btn');
        const loadingScreen = document.querySelector('.loading');
        
        // Debug helper
        function log(message) {
            console.log(message);
            if (debugInfo) {
                debugInfo.innerHTML += '<br>' + message;
            }
        }
        
        log("Loading Three.js addons...");
        
        // Log Three.js version
        log("Three.js version: " + THREE.REVISION);
        
        // Load addons sequentially to ensure dependencies are available
        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        // Main function that will run once all dependencies are loaded
        async function init() {
            try {
                // Load required scripts in sequence
                await loadScript('https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js');
                log("✓ OrbitControls loaded");
                
                await loadScript('https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js');
                log("✓ GLTFLoader loaded");
                
                await loadScript('https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/DRACOLoader.js');
                log("✓ DRACOLoader loaded");
                
                // Now that all scripts are loaded, initialize the 3D scene
                initScene();
            } catch (error) {
                log("❌ Error loading scripts: " + error.message);
                console.error(error);
            }
        }
        
        // Initialize the 3D scene
        function initScene() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x88ccff);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 10, 1000000);
            camera.position.set(0, 10000, 30000);
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('scene-container').appendChild(renderer.domElement);
            
            // Controls setup
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 500000;
            controls.minDistance = 100;
            
            // Initial camera target
            controls.target.set(0, 0, 0);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(1, 1, 1);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Helper grid
            const gridHelper = new THREE.GridHelper(50000, 50);
            scene.add(gridHelper);
            
            // Helper axes
            const axesHelper = new THREE.AxesHelper(10000);
            scene.add(axesHelper);
            
            // Add coordinate system with numerical markers
            function addCoordinateSystem() {
                const coordSystem = new THREE.Group();
                coordSystem.name = "coordinateSystem";
                
                // Create larger visible axes
                // X axis (red)
                const xMaterial = new THREE.LineBasicMaterial({ color: 0xff0000 });
                const xGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-50000, 0, 0),
                    new THREE.Vector3(50000, 0, 0)
                ]);
                const xLine = new THREE.Line(xGeometry, xMaterial);
                coordSystem.add(xLine);
                
                // Y axis (green)
                const yMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00 });
                const yGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, -10000, 0),
                    new THREE.Vector3(0, 50000, 0)
                ]);
                const yLine = new THREE.Line(yGeometry, yMaterial);
                coordSystem.add(yLine);
                
                // Z axis (blue)
                const zMaterial = new THREE.LineBasicMaterial({ color: 0x0000ff });
                const zGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, -50000),
                    new THREE.Vector3(0, 0, 50000)
                ]);
                const zLine = new THREE.Line(zGeometry, zMaterial);
                coordSystem.add(zLine);
                
                // Add numerical markers for each 10,000 units
                function createTextSprite(message, position, color) {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = 256;
                    canvas.height = 128;
                    
                    context.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    context.fillRect(0, 0, canvas.width, canvas.height);
                    
                    context.font = '70px Arial';
                    context.fillStyle = color;
                    context.textAlign = 'center';
                    context.textBaseline = 'middle';
                    context.fillText(message, canvas.width / 2, canvas.height / 2);
                    
                    const texture = new THREE.CanvasTexture(canvas);
                    const material = new THREE.SpriteMaterial({ map: texture });
                    const sprite = new THREE.Sprite(material);
                    sprite.position.copy(position);
                    sprite.scale.set(5000, 2500, 1);
                    
                    return sprite;
                }
                
                // Add X markers
                for (let i = -50000; i <= 50000; i += 10000) {
                    if (i === 0) continue; // Skip origin
                    let marker = createTextSprite(i.toString(), new THREE.Vector3(i, 2000, 0), '#ff0000');
                    coordSystem.add(marker);
                }
                
                // Add Y markers
                for (let i = 0; i <= 50000; i += 10000) {
                    if (i === 0) continue; // Skip origin
                    let marker = createTextSprite(i.toString(), new THREE.Vector3(2000, i, 0), '#00ff00');
                    coordSystem.add(marker);
                }
                
                // Add Z markers
                for (let i = -50000; i <= 50000; i += 10000) {
                    if (i === 0) continue; // Skip origin
                    let marker = createTextSprite(i.toString(), new THREE.Vector3(0, 2000, i), '#0000ff');
                    coordSystem.add(marker);
                }
                
                // Add an origin sphere
                const originGeometry = new THREE.SphereGeometry(1000, 16, 16);
                const originMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const origin = new THREE.Mesh(originGeometry, originMaterial);
                coordSystem.add(origin);
                
                // Add coordinate system removal button
                const removeButton = document.createElement('button');
                removeButton.textContent = 'Remove Coordinate System';
                removeButton.style.position = 'fixed';
                removeButton.style.top = '70px';
                removeButton.style.right = '30px';
                removeButton.style.padding = '10px';
                removeButton.style.backgroundColor = '#f44336';
                removeButton.style.color = 'white';
                removeButton.style.border = 'none';
                removeButton.style.borderRadius = '4px';
                removeButton.style.cursor = 'pointer';
                removeButton.style.zIndex = '1000';
                
                removeButton.addEventListener('click', function() {
                    scene.remove(coordSystem);
                    document.body.removeChild(this);
                    log('Coordinate system removed');
                });
                
                document.body.appendChild(removeButton);
                
                scene.add(coordSystem);
                log('Coordinate system added with markers at 10,000 unit intervals');
                
                return coordSystem;
            }
            
            // Create coordinate system
            const coordSystem = addCoordinateSystem();
            
            // Island sections definition
            const islandSections = [
                {
                    name: "Village",
                    description: "The main village area with residential buildings and community gathering spaces. The residents live in harmony with nature and have developed sustainable practices.",
                    startAngle: -Math.PI/8,
                    endAngle: Math.PI/8
                },
                {
                    name: "Source",
                    description: "The power source of the island - a mystical energy center that sustains all life. Ancient technology harnesses natural forces in a balanced ecosystem.",
                    startAngle: Math.PI/8,
                    endAngle: 3*Math.PI/8
                },
                {
                    name: "Buildings & Structures",
                    description: "Advanced technological structures built using sustainable materials. These buildings serve as research centers and environmental monitoring stations.",
                    startAngle: 3*Math.PI/8,
                    endAngle: 5*Math.PI/8
                },
                {
                    name: "Wildlife",
                    description: "Protected wildlife sanctuary with diverse species. This area is dedicated to conservation and the study of unique island ecosystems.",
                    startAngle: 5*Math.PI/8,
                    endAngle: 7*Math.PI/8
                },
                {
                    name: "Lookout",
                    description: "High observation point providing a panoramic view of both islands. Researchers use this point to study weather patterns and maintain communication systems.",
                    startAngle: 7*Math.PI/8,
                    endAngle: 9*Math.PI/8
                },
                {
                    name: "Gardens",
                    description: "Experimental gardens growing both native and adapted plant species. These serve as both food sources and botanical research facilities.",
                    startAngle: 9*Math.PI/8,
                    endAngle: 11*Math.PI/8
                },
                {
                    name: "Port",
                    description: "Small harbor area for water transport between islands. Sustainable vessels powered by renewable energy allow for safe passage.",
                    startAngle: 11*Math.PI/8,
                    endAngle: 13*Math.PI/8
                },
                {
                    name: "Training Grounds",
                    description: "Area dedicated to education and skill development. Community members learn essential survival skills and environmental stewardship.",
                    startAngle: 13*Math.PI/8,
                    endAngle: 15*Math.PI/8
                }
            ];
            
            // Create and animate the character around the island
            function createCharacter() {
                // Character properties
                const characterRadius = 10000 * 0.85 * 1.5; // 85% of island radius, increased by 50%
                let characterAngle = 0;
                let characterSpeed = 0.003;
                let characterMoving = true;
                
                // Create a character (simple colorful cube for visibility)
                const characterGeometry = new THREE.BoxGeometry(1500, 3000, 1500);
                const characterMaterial = new THREE.MeshPhongMaterial({ 
                    color: 0xffcc00,
                    emissive: 0xff4400,
                    emissiveIntensity: 0.5
                });
                const character = new THREE.Mesh(characterGeometry, characterMaterial);
                
                // Add a spotlight to make character more visible
                const characterLight = new THREE.PointLight(0xffaa00, 1, 10000);
                characterLight.position.set(0, 2000, 0);
                character.add(characterLight);
                
                // Elements for section information
                const sectionInfo = document.getElementById('section-info');
                const sectionTitle = document.getElementById('section-title');
                const sectionDescription = document.getElementById('section-description');
                
                // Current section tracking - initialize BEFORE calling updateCharacterPosition
                let currentSection = null;
                
                // Get current section based on angle
                function getCurrentSection(angle) {
                    // Normalize angle to 0-2π range
                    while (angle < 0) angle += 2 * Math.PI;
                    while (angle >= 2 * Math.PI) angle -= 2 * Math.PI;
                    
                    // Find which section contains this angle
                    return islandSections.find(section => {
                        let start = section.startAngle;
                        let end = section.endAngle;
                        
                        // Handle sections that cross the 0/2π boundary
                        if (end < start) {
                            return angle >= start || angle < end;
                        }
                        
                        return angle >= start && angle < end;
                    });
                }
                
                // Update character position
                function updateCharacterPosition() {
                    const x = characterRadius * Math.cos(characterAngle);
                    const z = characterRadius * Math.sin(characterAngle);
                    character.position.set(x, 1000, z);
                    
                    // Make character face the direction of movement (tangent to circle)
                    character.rotation.y = characterAngle + Math.PI / 2;
                    
                    // Check if section changed
                    const newSection = getCurrentSection(characterAngle);
                    if (newSection && newSection !== currentSection) {
                        currentSection = newSection;
                        
                        // Update section info display
                        sectionTitle.textContent = currentSection.name;
                        sectionDescription.textContent = currentSection.description;
                        
                        // Show the section info with animation
                        sectionInfo.style.display = 'block';
                        sectionInfo.style.opacity = '0';
                        
                        // Fade in animation
                        let opacity = 0;
                        const fadeIn = setInterval(() => {
                            opacity += 0.05;
                            sectionInfo.style.opacity = opacity;
                            if (opacity >= 1) clearInterval(fadeIn);
                        }, 20);
                    }
                }
                
                // Initial position - call AFTER currentSection is defined
                updateCharacterPosition();
                scene.add(character);
                
                // Update function to be called each frame
                window.updateCharacter = function() {
                    if (characterMoving) {
                        characterAngle += characterSpeed;
                        if (characterAngle > Math.PI * 2) characterAngle -= Math.PI * 2;
                        updateCharacterPosition();
                    }
                };
                
                // Add controls
                const toggleButton = document.getElementById('toggle-character');
                toggleButton.addEventListener('click', function() {
                    characterMoving = !characterMoving;
                    toggleButton.textContent = characterMoving ? 
                        'Pause Character' : 'Resume Character';
                });
                
                const speedSlider = document.getElementById('character-speed');
                speedSlider.addEventListener('input', function() {
                    characterSpeed = 0.001 * parseFloat(this.value);
                });
                
                return character;
            }
            
            // Create and start the character
            const character = createCharacter();
            
            // Create island positions
            const mainIslandPosition = new THREE.Vector3(0, 0, 0);
            const distantIslandPosition = new THREE.Vector3(0, 0, -500000);
            
            // Create placeholder boxes for islands
            createPlaceholderIslands(mainIslandPosition, distantIslandPosition);
            
            // Load the actual GLB models
            loadIslandModels(mainIslandPosition, distantIslandPosition);
            
            // Set up the flight button
            flightBtn.addEventListener('click', animateCameraFlight);
            
            // Start the animation loop
            animate();
            
            // Handle window resizing
            window.addEventListener('resize', onWindowResize);
            
            log("✓ Scene initialized");
        }
        
        // Create placeholder boxes for islands
        function createPlaceholderIslands(mainPos, distantPos) {
            // Red box for main island
            const mainPlaceholder = new THREE.Mesh(
                new THREE.BoxGeometry(10000, 2000, 10000),
                new THREE.MeshPhongMaterial({ color: 0xff0000, wireframe: true })
            );
            mainPlaceholder.position.copy(mainPos);
            scene.add(mainPlaceholder);
            
            // Green box for distant island
            const distantPlaceholder = new THREE.Mesh(
                new THREE.BoxGeometry(20000, 4000, 20000),
                new THREE.MeshPhongMaterial({ color: 0x00ff00, wireframe: true })
            );
            distantPlaceholder.position.copy(distantPos);
            scene.add(distantPlaceholder);
        }
        
        // Load the island GLB models
        function loadIslandModels(mainPos, distantPos) {
            log("Loading GLB models...");
            
            // Create groups to hold models
            mainIsland = new THREE.Group();
            mainIsland.position.copy(mainPos);
            scene.add(mainIsland);
            
            distantIsland = new THREE.Group();
            distantIsland.position.copy(distantPos);
            scene.add(distantIsland);
            
            // Set up GLTF loader
            const loader = new THREE.GLTFLoader();
            
            // Try to load main island
            try {
                loader.load(
                    'models/GloomyDoomy2.glb',
                    function(gltf) {
                        log("✓ Main island model loaded");
                        gltf.scene.scale.set(2000, 2000, 2000);
                        gltf.scene.position.y = -500;
                        mainIsland.add(gltf.scene);
                        
                        // Load second island after first one succeeds
                        loadDistantIsland();
                    },
                    function(xhr) {
                        log("Main island: " + Math.round(xhr.loaded / xhr.total * 100) + "% loaded");
                    },
                    function(error) {
                        log("❌ Error loading main island: " + error.message);
                        console.error(error);
                        // Still try to load the second island even if first fails
                        loadDistantIsland();
                    }
                );
            } catch (e) {
                log("❌ Exception loading main island: " + e.message);
                loadDistantIsland();
            }
            
            // Function to load the second island
            function loadDistantIsland() {
                try {
                    loader.load(
                        'models/IslandCopyTest.glb',
                        function(gltf) {
                            log("✓ Distant island model loaded");
                            gltf.scene.scale.set(8000, 8000, 8000);
                            gltf.scene.position.y = -500;
                            distantIsland.add(gltf.scene);
                            
                            // Hide loading screen when done
                            loadingScreen.style.display = 'none';
                        },
                        function(xhr) {
                            log("Distant island: " + Math.round(xhr.loaded / xhr.total * 100) + "% loaded");
                        },
                        function(error) {
                            log("❌ Error loading distant island: " + error.message);
                            console.error(error);
                            // Hide loading screen even if there's an error
                            loadingScreen.style.display = 'none';
                        }
                    );
                } catch (e) {
                    log("❌ Exception loading distant island: " + e.message);
                    loadingScreen.style.display = 'none';
                }
            }
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (controls) controls.update();
            
            // Update character position if it exists and movement is enabled
            if (typeof updateCharacter === 'function') {
                updateCharacter();
            }
            
            // Update debug info
            if (camera && controls) {
                debugInfo.innerHTML = `
                    Camera: (${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)})<br>
                    Target: (${Math.round(controls.target.x)}, ${Math.round(controls.target.y)}, ${Math.round(controls.target.z)})<br>
                    Location: ${currentLocation}
                `;
            }
            
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        // Handle window resize
        function onWindowResize() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        
        // Camera flight animation
        function animateCameraFlight() {
            if (isAnimating || !camera || !controls) return;
            
            log("Starting flight");
            isAnimating = true;
            controls.enabled = false;
            
            // Current position and target
            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            
            // Determine destination based on current location
            let endPos, endTarget;
            
            if (currentLocation === 'main') {
                // Flying to distant island
                endPos = new THREE.Vector3(0, 10000, -470000);
                endTarget = new THREE.Vector3(0, 0, -500000);
                currentLocation = 'distant';
                locationDisplay.textContent = 'Distant Island';
                flightBtn.textContent = 'Return to Main Island';
            } else {
                // Flying back to main island
                endPos = new THREE.Vector3(0, 10000, 30000);
                endTarget = new THREE.Vector3(0, 0, 0);
                currentLocation = 'main';
                locationDisplay.textContent = 'Main Island';
                flightBtn.textContent = 'Fly to Distant Island';
            }
            
            // Create flight path with a high arc
            const midPos1 = new THREE.Vector3().lerpVectors(startPos, endPos, 0.3);
            midPos1.y = 50000; // High point in the arc
            
            const midPos2 = new THREE.Vector3().lerpVectors(startPos, endPos, 0.7);
            midPos2.y = 50000; // High point in the arc
            
            // Target points along the way
            const midTarget1 = new THREE.Vector3().lerpVectors(startTarget, endTarget, 0.3);
            const midTarget2 = new THREE.Vector3().lerpVectors(startTarget, endTarget, 0.7);
            
            // Flight path segments
            const path = [
                { pos: startPos, target: startTarget },
                { pos: midPos1, target: midTarget1 },
                { pos: midPos2, target: midTarget2 },
                { pos: endPos, target: endTarget }
            ];
            
            // Animation timing
            const duration = 10000; // 10 seconds
            const startTime = Date.now();
            
            // Animation step function
            function animationStep() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                if (progress < 1) {
                    // Calculate which segment of the path we're in
                    const segments = path.length - 1;
                    const segmentProgress = progress * segments;
                    const segmentIndex = Math.min(Math.floor(segmentProgress), segments - 1);
                    const segmentT = segmentProgress - segmentIndex;
                    
                    // Get the current segment's start and end points
                    const p0 = path[segmentIndex].pos;
                    const p1 = path[segmentIndex + 1].pos;
                    const t0 = path[segmentIndex].target;
                    const t1 = path[segmentIndex + 1].target;
                    
                    // Interpolate position and look target
                    camera.position.lerpVectors(p0, p1, segmentT);
                    controls.target.lerpVectors(t0, t1, segmentT);
                    
                    // Continue animation
                    requestAnimationFrame(animationStep);
                } else {
                    // Animation complete - ensure we're exactly at the end position
                    camera.position.copy(endPos);
                    controls.target.copy(endTarget);
                    
                    // Re-enable controls and update
                    controls.enabled = true;
                    isAnimating = false;
                    log("Flight complete - new location: " + currentLocation);
                }
            }
            
            // Start the animation
            animationStep();
        }
        
        // Start the initialization
        init();
    </script>
</body>
</html>
