<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Journey Through Time: The Tata Steel Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, 
                rgba(29, 78, 216, 0.15) 0%,
                rgba(17, 24, 39, 0) 50%);
            z-index: 1;
            pointer-events: none;
        }

        .main-content {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            z-index: 2;
        }

        .title-container {
            text-align: center;
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards 0.3s;
        }

        .cta-button {
            display: inline-block;
            background: rgba(29, 78, 216, 0.2);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            border: 1px solid rgba(29, 78, 216, 0.3);
            transition: all 0.3s ease;
            margin: 0 1rem;
        }

        .cta-button:hover {
            background: rgba(29, 78, 216, 0.3);
            transform: translateY(-2px);
        }

        .cta-button.dystopian {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff3333;
        }

        .cta-button.dystopian:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(29, 78, 216, 0.2), transparent);
        }

        .shape-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            left: -200px;
            animation: float 20s infinite alternate;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            animation: float 15s infinite alternate-reverse;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <main class="main-content">
        <div class="title-container">
            <h1>A Journey Through Time<br>The Tata Steel Factory</h1>
            <p class="subtitle">Ontdek de belangrijke gebeurtenissen en ontwikkelingen in de geschiedenis van Tata Steel en de impact op de omgeving van IJmond.</p>
            <div class="button-container">
                <a href="viewer.html" class="cta-button">Begin the Journey</a>
                <a href="dystopian-island.html" class="cta-button dystopian">Enter Dystopian Future</a>
            </div>
        </div>
    </main>
</body>
</html>
